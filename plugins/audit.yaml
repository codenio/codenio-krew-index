apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: audit
spec:
  version: v0.6.0
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.0/audit_linux_amd64.tar.gz
      sha256: "765ea46b599623179d1ce33bff187a534fbcd68423a5348babd1caf2e50e9bca"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.0/audit_linux_arm64.tar.gz
      sha256: "c66e20f414f4c344db4832321ef21ec1114a0f284ea6e8932f22a0316a53db84"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.0/audit_darwin_amd64.tar.gz
      sha256: "5817110d3ca674b468df80b9ae1af85c7f50126823ce589a3a4dee5f79ea209e"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.0/audit_darwin_arm64.tar.gz
      sha256: "b90c1fdca2e2f98c88fa1a0f9cae5203469563184ecb5a67363390ddc6181f61"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.0/audit_windows_amd64.zip
      sha256: "ea9c1d1c57013075458bf6b85668991b2825ed630e52e0e899750013beedc2a2"
      files:
        - from: audit.exe
          to: .
        - from: LICENSE
          to: .
      bin: audit.exe
  shortDescription: Run Kubernetes resource audits
  homepage: https://github.com/codenio/kubectl-audit
  caveats: |
    Usage:
      $ kubectl audit

    For additional options:
      $ kubectl audit --help
      or https://github.com/codenio/kubectl-audit/blob/v0.6.0/doc/USAGE.md

  description: |
    Run quick Kubernetes resource audits for common operational issues, including
    non-running pods, NotReady/SchedulingDisabled nodes, non-Bound PVC/PV,
    failed jobs, and suspended cronjobs.
