apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: audit
spec:
  version: v0.6.1
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.1/audit_linux_amd64.tar.gz
      sha256: "9a110946cb1311f54c430fa32a40244e48f8702909169a0c07085d6f5dfe23bc"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.1/audit_linux_arm64.tar.gz
      sha256: "9c367f0c0ae5cc6ed0c47fab4acde518b37250c1ef7c2089565f1d915fa98469"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.1/audit_darwin_amd64.tar.gz
      sha256: "263563f3103be953149b01403e431e5e5f626307b9cddd69edb7870c98fc3488"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.1/audit_darwin_arm64.tar.gz
      sha256: "c83d93cb2f158839c9439d3e1af92b7dc33541e0c14c63be9a5fb1819f9e8ee0"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.6.1/audit_windows_amd64.zip
      sha256: "0b9559bce0ad18a58345c69f41de11a6504f3e3a566f5f78149d7e75e539df9c"
      files:
        - from: audit.exe
          to: .
        - from: LICENSE
          to: .
      bin: audit.exe
  shortDescription: Run Kubernetes resource audits
  homepage: https://github.com/codenio/kubectl-audit
  caveats: |
    Usage:
      $ kubectl audit

    For additional options:
      $ kubectl audit --help
      or https://github.com/codenio/kubectl-audit/blob/v0.6.1/doc/USAGE.md

  description: |
    Run quick Kubernetes resource audits for common operational issues, including
    non-running pods, NotReady/SchedulingDisabled nodes, non-Bound PVC/PV,
    failed jobs, and suspended cronjobs.
