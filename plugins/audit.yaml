apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: audit
spec:
  version: v0.4.0
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.4.0/audit_linux_amd64.tar.gz
      sha256: "16f798fe1c1e558f3299797f23db72199d4fdcc9f5ca61dc63dc0bd01114e3dc"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.4.0/audit_linux_arm64.tar.gz
      sha256: "cf9989a9fc3ffa1f91ff79fe97c40a2b11a95bec243b5f4e6a0a8681ab05885c"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.4.0/audit_darwin_amd64.tar.gz
      sha256: "93511151a39d1d12add8e648bf77939c92ab1964031657c3e9d785cd2611f365"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.4.0/audit_darwin_arm64.tar.gz
      sha256: "ce9e56bb77b4f249da3235141980d06be5a6efbfcccbe245f5eeb089b3ab45a7"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.4.0/audit_windows_amd64.zip
      sha256: "d85a26f38772a27410d58bc2e98d134fc3129f8f749a7d5f7c117cedfef0c3e2"
      files:
        - from: audit.exe
          to: .
        - from: LICENSE
          to: .
      bin: audit.exe
  shortDescription: Run Kubernetes resource audits
  homepage: https://github.com/codenio/kubectl-audit
  caveats: |
    Usage:
      $ kubectl audit

    For additional options:
      $ kubectl audit --help
      or https://github.com/codenio/kubectl-audit/blob/v0.4.0/doc/USAGE.md

  description: |
    Run quick Kubernetes resource audits for common operational issues, including
    non-running pods, NotReady/SchedulingDisabled nodes, non-Bound PVC/PV,
    failed jobs, and suspended cronjobs.
