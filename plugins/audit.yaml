apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: audit
spec:
  version: v0.2.0
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.2.0/audit_linux_amd64.tar.gz
      sha256: "ef37e50b469ad06a1e778a9e5c57a3bc2069abd2a8445224d365bfc559b32cc9"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.2.0/audit_linux_arm64.tar.gz
      sha256: "9290c5b22a5c8abc76f98d4707f7f60d2eb0671f6a450bdee3bea666ee1117d4"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.2.0/audit_darwin_amd64.tar.gz
      sha256: "0b424daa4695191edc4d946fab09a568bfb2058241ba3c20c097ef255f3ed235"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.2.0/audit_darwin_arm64.tar.gz
      sha256: "6f943d6a63ca406dd2356b67a62b054f49da72d5710dd33e872b77a1d789d078"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.2.0/audit_windows_amd64.zip
      sha256: "2d6c364f58452615eea8a157a0f54edd222ac9882f14401488154059821de16b"
      files:
        - from: audit.exe
          to: .
        - from: LICENSE
          to: .
      bin: audit.exe
  shortDescription: Run Kubernetes resource audits
  homepage: https://github.com/codenio/kubectl-audit
  caveats: |
    Usage:
      $ kubectl audit

    For additional options:
      $ kubectl audit --help
      or https://github.com/codenio/kubectl-audit/blob/v0.2.0/doc/USAGE.md

  description: |
    Run quick Kubernetes resource audits for common operational issues, including
    non-running pods, NotReady/SchedulingDisabled nodes, non-Bound PVC/PV,
    failed jobs, and suspended cronjobs.
