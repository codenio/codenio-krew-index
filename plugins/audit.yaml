apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: audit
spec:
  version: v0.7.0
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.7.0/audit_linux_amd64.tar.gz
      sha256: "db0a4eefe04fbaa1c867e50203fd676970ebffd6b41b3f200ca3dfef1cbd9b72"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.7.0/audit_linux_arm64.tar.gz
      sha256: "90f9bd70899bae991c45747d51021da572a7b74df5cea61e61c255ba186b3790"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.7.0/audit_darwin_amd64.tar.gz
      sha256: "7255ca80578daa3c759d78826af11bcde5679e807770df3f6fb408074e8a4e82"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.7.0/audit_darwin_arm64.tar.gz
      sha256: "56d7d5e9cb8f818c1e1d4083b1633841ed6d4f6ecb24074ab49131c91d67948e"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.7.0/audit_windows_amd64.zip
      sha256: "1b7cf795c9cc6cc62479e71d31086ce82ec061d38a0c03ab48fc191504f22038"
      files:
        - from: audit.exe
          to: .
        - from: LICENSE
          to: .
      bin: audit.exe
  shortDescription: Run Kubernetes resource audits
  homepage: https://github.com/codenio/kubectl-audit
  caveats: |
    Usage:
      $ kubectl audit

    For additional options:
      $ kubectl audit --help
      or https://github.com/codenio/kubectl-audit/blob/v0.7.0/doc/USAGE.md

  description: |
    Run quick Kubernetes resource audits for common operational issues, including
    non-running pods, NotReady/SchedulingDisabled nodes, non-Bound PVC/PV,
    failed jobs, and suspended cronjobs.
