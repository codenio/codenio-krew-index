apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: audit
spec:
  version: v0.9.0
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.9.0/audit_linux_amd64.tar.gz
      sha256: "63fb76b20d694590307d139c54b99e578e0670c36fd22f6f2f64be14234fa2cf"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.9.0/audit_linux_arm64.tar.gz
      sha256: "454e22c75dd45c769d226118c9e5863b36d6d2dbd4bbda25559bc84339dbca07"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.9.0/audit_darwin_amd64.tar.gz
      sha256: "ed26999316b75b3f5824f0a9d6b35949cba8ea9f77ca02e2e4ab65968aef4b9f"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.9.0/audit_darwin_arm64.tar.gz
      sha256: "bff26060cc1516ff30e4ea30ca9dfa57c356aaf6926b2db373f1029484f11116"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.9.0/audit_windows_amd64.zip
      sha256: "28d34a2e8085389513762704deb703837cc265d707634ca5aa333e817e75ff1d"
      files:
        - from: audit.exe
          to: .
        - from: LICENSE
          to: .
      bin: audit.exe
  shortDescription: Run Kubernetes resource audits
  homepage: https://github.com/codenio/kubectl-audit
  caveats: |
    Usage:
      $ kubectl audit

    For additional options:
      $ kubectl audit --help
      or https://codenio.github.io/kubectl-audit/

  description: |
    Run quick Kubernetes resource audits for common operational issues, including
    non-running pods, NotReady/SchedulingDisabled nodes, non-Bound PVC/PV,
    failed jobs, and suspended cronjobs.
