apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: audit
spec:
  version: v0.3.0
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.3.0/audit_linux_amd64.tar.gz
      sha256: "30b71a0d4aec64cf48b7919bc956b0f3d198cdafc2559462b6d1223f12c29bdf"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.3.0/audit_linux_arm64.tar.gz
      sha256: "a50ed52a3f74b823595ef8779e6e8fb4f2c4c9b42eb0e4d1ac28d71bc6cce1af"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.3.0/audit_darwin_amd64.tar.gz
      sha256: "8f52e4fe88c8c438bfad501e80c3aa8545e4efe304182121edd8a2b199033aa2"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.3.0/audit_darwin_arm64.tar.gz
      sha256: "92cf87f293e14d50b68eb0c9a7fb95035576e9cc12c2895445e885b43b821fd6"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.3.0/audit_windows_amd64.zip
      sha256: "32ed7a55012edfcd6536897b817bb9186e1b156ec6389323a11d5bee0cfabbb5"
      files:
        - from: audit.exe
          to: .
        - from: LICENSE
          to: .
      bin: audit.exe
  shortDescription: Run Kubernetes resource audits
  homepage: https://github.com/codenio/kubectl-audit
  caveats: |
    Usage:
      $ kubectl audit

    For additional options:
      $ kubectl audit --help
      or https://github.com/codenio/kubectl-audit/blob/v0.3.0/doc/USAGE.md

  description: |
    Run quick Kubernetes resource audits for common operational issues, including
    non-running pods, NotReady/SchedulingDisabled nodes, non-Bound PVC/PV,
    failed jobs, and suspended cronjobs.
