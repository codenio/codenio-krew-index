apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: audit
spec:
  version: v0.8.0
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.8.0/audit_linux_amd64.tar.gz
      sha256: "c8b9c5daf1bb90fac0169b27bf4666e4879d253ac5baf6b204d235a7678bf3cf"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.8.0/audit_linux_arm64.tar.gz
      sha256: "af6357526704097db7490e13e7131f612ddf416b950ea226061b1769afb57823"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.8.0/audit_darwin_amd64.tar.gz
      sha256: "38ed2a0adfa93e56c35a1d6762fd4296602c5e2623d1cd34918bc81b527e4758"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.8.0/audit_darwin_arm64.tar.gz
      sha256: "a9150b5f7da95b329f46c27e4820fef90560afc9028ebc9253899931c0c7ed62"
      files:
        - from: audit
          to: .
        - from: LICENSE
          to: .
      bin: audit
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/codenio/kubectl-audit/releases/download/v0.8.0/audit_windows_amd64.zip
      sha256: "620896b0a80468e82aecc419edf64991a071f879f48f60a30f836ea8ba5e0ff7"
      files:
        - from: audit.exe
          to: .
        - from: LICENSE
          to: .
      bin: audit.exe
  shortDescription: Run Kubernetes resource audits
  homepage: https://github.com/codenio/kubectl-audit
  caveats: |
    Usage:
      $ kubectl audit

    For additional options:
      $ kubectl audit --help
      or https://codenio.github.io/kubectl-audit/

  description: |
    Run quick Kubernetes resource audits for common operational issues, including
    non-running pods, NotReady/SchedulingDisabled nodes, non-Bound PVC/PV,
    failed jobs, and suspended cronjobs.
